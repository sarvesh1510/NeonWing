<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEONWING</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;overscroll-behavior:none}
#c{display:block;position:absolute;top:0;left:0;touch-action:none;cursor:pointer}
/* ── SCREENS (HTML overlays only on non-playing states) ── */
.scr{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s ease}
.scr.on{opacity:1;pointer-events:all}
/* ── TYPOGRAPHY ── */
.t-title{font-size:clamp(52px,14vw,110px);font-weight:900;letter-spacing:-3px;color:#fff;line-height:.9;text-align:center;text-shadow:0 0 30px #00f5ff,0 0 80px rgba(0,245,255,.35)}
.t-sub{font-size:clamp(9px,2.5vw,13px);letter-spacing:10px;color:#00f5ff;text-transform:uppercase;margin:14px 0 36px;opacity:.75}
.t-best-label{font-size:10px;letter-spacing:5px;color:rgba(255,255,255,.4);text-transform:uppercase}
.t-best-val{font-size:clamp(22px,5vw,38px);font-weight:700;color:#ffbe0b;letter-spacing:2px;margin-bottom:32px;text-shadow:0 0 15px #ffbe0b}
.t-tap{font-size:clamp(11px,3vw,16px);letter-spacing:7px;color:rgba(255,255,255,.65);text-transform:uppercase;animation:blink 1.6s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.65}55%{opacity:.15}}
/* ── BUTTONS ── */
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:22px}
.btn{border:none;outline:none;cursor:pointer;font-family:inherit;font-weight:700;text-transform:uppercase;letter-spacing:5px;border-radius:10px;transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s;touch-action:manipulation;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.08);opacity:0;transition:opacity .15s}
.btn:active{transform:scale(.93)!important}
.btn-lg{padding:16px 36px;font-size:clamp(12px,3vw,15px);background:linear-gradient(135deg,#00f5ff,#8338ec);color:#fff;box-shadow:0 0 22px rgba(0,245,255,.4),0 4px 16px rgba(0,0,0,.4)}
.btn-lg:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 0 35px rgba(0,245,255,.55),0 8px 24px rgba(0,0,0,.45)}
.btn-sm{padding:13px 22px;font-size:11px;letter-spacing:4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75)}
.btn-sm:hover{transform:translateY(-2px);background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25)}
/* ── GAME OVER ── */
#scrGO{background:rgba(2,6,18,.92)}
.go-title{font-size:clamp(38px,9vw,72px);font-weight:900;letter-spacing:-2px;color:#ff006e;text-shadow:0 0 25px #ff006e,0 0 60px #ff006e;animation:goShk .45s ease-out}
@keyframes goShk{0%,100%{transform:none}20%{transform:translateX(-7px)}45%{transform:translateX(7px)}70%{transform:translateX(-4px)}88%{transform:translateX(3px)}}
.score-box{margin:18px 0;padding:18px 40px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);border-radius:14px;text-align:center;width:min(280px,82vw)}
.sc-lbl{font-size:10px;letter-spacing:6px;color:rgba(255,255,255,.38);text-transform:uppercase;margin-bottom:6px}
.sc-val{font-size:clamp(30px,7vw,52px);font-weight:900;color:#fff;letter-spacing:-1px}
.sc-val.gold{color:#ffbe0b;text-shadow:0 0 14px #ffbe0b}
.new-badge{display:inline-block;background:#ffbe0b;color:#000;font-size:9px;letter-spacing:4px;padding:2px 8px;border-radius:4px;font-weight:700;vertical-align:middle;margin-left:8px;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
/* ── SKIN ROW ── */
.skin-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0 4px}
.sk{width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,.18);background:rgba(0,0,0,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:21px;transition:all .2s cubic-bezier(.34,1.56,.64,1);touch-action:manipulation}
.sk:active{transform:scale(.88)}
.sk.active{border-color:#00f5ff;box-shadow:0 0 14px rgba(0,245,255,.55);transform:scale(1.12)}
.sk.locked{opacity:.3;cursor:default;filter:grayscale(1)}
/* ── PAUSE ── */
#scrPause{background:rgba(2,6,18,.88);backdrop-filter:blur(12px)}
.pause-title{font-size:clamp(30px,7vw,56px);font-weight:900;color:#fff;letter-spacing:-1px;text-shadow:0 0 20px rgba(255,255,255,.4);margin-bottom:28px}
/* ── SETTINGS ── */
#scrSet{background:rgba(2,6,18,.95);overflow-y:auto;justify-content:flex-start;padding-top:32px}
.set-panel{width:min(440px,92%);padding:0 0 40px}
.set-title{font-size:20px;font-weight:900;color:#00f5ff;letter-spacing:5px;text-transform:uppercase;margin-bottom:20px;text-align:center}
.set-row{display:flex;justify-content:space-between;align-items:center;padding:17px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.set-lbl{font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.68);text-transform:uppercase}
.tog{width:50px;height:28px;background:rgba(255,255,255,.1);border-radius:14px;position:relative;cursor:pointer;transition:background .3s;border:1px solid rgba(255,255,255,.12);flex-shrink:0;touch-action:manipulation}
.tog.on{background:#00f5ff;box-shadow:0 0 12px rgba(0,245,255,.5)}
.tog-k{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .28s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 5px rgba(0,0,0,.35)}
.tog.on .tog-k{transform:translateX(22px)}
/* ── ACHIEVEMENTS ── */
#scrAch{background:rgba(2,6,18,.95);overflow-y:auto;justify-content:flex-start;padding-top:24px}
.ach-wrap{width:min(560px,95%);display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 0 32px}
.ach-card{padding:14px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.07);border-radius:10px}
.ach-card.done{border-color:#ffbe0b;box-shadow:0 0 12px rgba(255,190,11,.18)}
.ach-ico{font-size:26px;margin-bottom:6px}
.ach-nm{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.88);font-weight:700;text-transform:uppercase}
.ach-ds{font-size:9px;color:rgba(255,255,255,.38);margin-top:3px;line-height:1.5}
/* ── READY OVERLAY (drawn on canvas — no HTML) ── */
/* ── ACH POPUP ── */
#achPop{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(90px);background:rgba(0,0,0,.92);border:1px solid #ffbe0b;border-radius:12px;padding:14px 22px;min-width:260px;text-align:center;z-index:200;transition:transform .5s cubic-bezier(.34,1.56,.64,1),opacity .5s;opacity:0;pointer-events:none;box-shadow:0 0 28px rgba(255,190,11,.28)}
#achPop.show{transform:translateX(-50%) translateY(0);opacity:1}
.ap-lbl{font-size:8px;letter-spacing:6px;color:#ffbe0b;text-transform:uppercase;margin-bottom:5px}
.ap-nm{font-size:15px;color:#fff;font-weight:700}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
/* ── MOBILE MEDIA ── */
@media(max-width:420px){
  .score-box{padding:14px 20px}
  .btn-lg{padding:15px 28px}
  .ach-wrap{grid-template-columns:1fr}
  .set-row{padding:15px 0}
}
</style>
</head>
<body>

<!-- ── ACH POPUP ── -->
<div id="achPop"><div class="ap-lbl">Achievement Unlocked</div><div class="ap-nm" id="achPopName"></div></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// SETTINGS  — live object, read at call-time everywhere
// ═══════════════════════════════════════════════════════════════
const S = {
  sound:true, music:true, vibration:true, particles:true,
  reducedMotion:false, highContrast:false,
  load(){
    try{ const d=JSON.parse(localStorage.getItem('nw_s')||'{}'); Object.assign(this,d); }catch(e){}
  },
  save(){
    try{ localStorage.setItem('nw_s',JSON.stringify({
      sound:this.sound,music:this.music,vibration:this.vibration,
      particles:this.particles,reducedMotion:this.reducedMotion,highContrast:this.highContrast
    })); }catch(e){}
  }
};

// ═══════════════════════════════════════════════════════════════
// SAVE DATA
// ═══════════════════════════════════════════════════════════════
const D = {
  best:0, runs:0, achs:{}, skinIdx:0, skins:[0],
  load(){
    try{ const d=JSON.parse(localStorage.getItem('nw_d')||'{}');
      this.best=d.best||0; this.runs=d.runs||0; this.achs=d.achs||{};
      this.skinIdx=d.skinIdx||0; this.skins=d.skins||[0];
    }catch(e){}
  },
  save(){
    try{ localStorage.setItem('nw_d',JSON.stringify({
      best:this.best,runs:this.runs,achs:this.achs,skinIdx:this.skinIdx,skins:this.skins
    })); }catch(e){}
  },
  unlockSkin(i){ if(!this.skins.includes(i)){ this.skins.push(i); this.save(); return true; } return false; }
};

// ═══════════════════════════════════════════════════════════════
// AUDIO ENGINE  — checks S.sound / S.music at call-time
// ═══════════════════════════════════════════════════════════════
const Audio = (() => {
  let ctx=null, musicTimer=null, musicGain=null;
  function init(){
    if(ctx) return;
    try{ ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  function resume(){ if(ctx && ctx.state==='suspended') ctx.resume().catch(()=>{}); }
  function osc(freq, type, dur, vol, delay=0){
    if(!ctx || !S.sound) return;
    const t = ctx.currentTime + delay;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+dur);
  }
  function noise(dur, vol, delay=0){
    if(!ctx || !S.sound) return;
    const t = ctx.currentTime+delay;
    const n = ctx.sampleRate*dur, buf=ctx.createBuffer(1,n,ctx.sampleRate);
    const data=buf.getChannelData(0); for(let i=0;i<n;i++) data[i]=Math.random()*2-1;
    const src=ctx.createBufferSource(), g=ctx.createGain(), flt=ctx.createBiquadFilter();
    src.buffer=buf; flt.type='bandpass'; flt.frequency.value=600;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.connect(flt); flt.connect(g); g.connect(ctx.destination); src.start(t); src.stop(t+dur);
  }
  function beat(){
    if(!ctx || !S.music) return;
    const sc=[220,247,261,294,329,392,440,523];
    let t=ctx.currentTime;
    for(let i=0;i<8;i++){
      const f=sc[Math.floor(Math.random()*sc.length)];
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0.001,t+i*0.5); g.gain.linearRampToValueAtTime(0.06,t+i*0.5+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+i*0.5+0.42);
      o.connect(g); g.connect(ctx.destination); o.start(t+i*0.5); o.stop(t+i*0.5+0.5);
    }
    musicTimer = setTimeout(beat, 4100);
  }
  return {
    init, resume,
    flap(){ osc(300,'sine',.07,.4); osc(600,'sine',.05,.2,.02); },
    score(){ [0,.06,.12].forEach((d,i)=>osc([523,659,784][i],'sine',.1,.32,d)); },
    nearMiss(){ osc(880,'sawtooth',.12,.25); osc(440,'sawtooth',.08,.18,.04); },
    combo(n){ const b=440*Math.pow(1.2,Math.min(n,8)); osc(b,'triangle',.12,.38); osc(b*1.5,'sine',.08,.25,.05); },
    hyper(){ for(let i=0;i<4;i++) osc(220*Math.pow(2,i/4),'sawtooth',.14,.28,i*.04); osc(880,'sine',.2,.45,.1); },
    die(){ noise(.12,.55); osc(220,'sawtooth',.18,.48,.04); osc(100,'sawtooth',.3,.55,.1); osc(55,'sine',.4,.35,.2); },
    startMusic(){ clearTimeout(musicTimer); beat(); },
    stopMusic(){ clearTimeout(musicTimer); }
  };
})();

// ═══════════════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════════════
class Particles {
  constructor(){ this.p=[]; }
  spawn(x,y,{count=8,speed=100,color='#00f5ff',size=3,decay=2,angle=null,gravity=false}={}){
    if(!S.particles) return;
    for(let i=0;i<count;i++){
      const a = angle!=null ? angle+( Math.random()-.5)*.8 : Math.random()*Math.PI*2;
      const sp = speed*(.6+Math.random()*.8);
      this.p.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:decay+Math.random()*1.5,
        size:size*(.5+Math.random()*.8),color,gravity:gravity?250:0});
    }
  }
  trail(x,y,color){
    if(!S.particles||Math.random()>.5) return;
    this.p.push({x,y,vx:(Math.random()-.5)*25,vy:(Math.random()-.5)*18,life:1,
      decay:4+Math.random()*3,size:1.2+Math.random()*2,color,gravity:0});
  }
  update(dt){
    for(let i=this.p.length-1;i>=0;i--){
      const p=this.p[i]; p.x+=p.vx*dt; p.vy+=p.gravity*dt; p.y+=p.vy*dt; p.life-=p.decay*dt;
      if(p.life<=0) this.p.splice(i,1);
    }
  }
  draw(ctx){
    this.p.forEach(p=>{
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      ctx.shadowBlur=10; ctx.shadowColor=p.color; ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*Math.max(.1,p.life),0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }
  clear(){ this.p=[]; }
}

// ═══════════════════════════════════════════════════════════════
// SKINS
// ═══════════════════════════════════════════════════════════════
const SKINS = [
  {name:'Cyan',   e:'🐦', c:'#00f5ff', w:'#0088ff', t:'#00f5ff'},
  {name:'Pink',   e:'🦜', c:'#ff006e', w:'#ff44aa', t:'#ff006e'},
  {name:'Gold',   e:'🦅', c:'#ffbe0b', w:'#ff8800', t:'#ffbe0b'},
  {name:'Green',  e:'🦚', c:'#06d6a0', w:'#00b4d8', t:'#06d6a0'},
  {name:'Purple', e:'🦋', c:'#a855f7', w:'#c084fc', t:'#a855f7'},
  {name:'White',  e:'🕊️', c:'#ffffff', w:'#ccddff', t:'#e0e8ff'},
];

// ═══════════════════════════════════════════════════════════════
// ACHIEVEMENTS
// ═══════════════════════════════════════════════════════════════
const ACHS = [
  {id:'s1',   name:'First Flight',  desc:'Score your first point',    ico:'🐣', chk:g=>g.score>=1},
  {id:'s5',   name:'On Fire',       desc:'Score 5 in one run',         ico:'🔥', chk:g=>g.score>=5},
  {id:'s10',  name:'Double Digits', desc:'Score 10 points',            ico:'⚡', chk:g=>g.score>=10},
  {id:'s25',  name:'Pilot',         desc:'Score 25 points',            ico:'✈️', chk:g=>g.score>=25},
  {id:'s50',  name:'Ace',           desc:'Score 50 points',            ico:'🏅', chk:g=>g.score>=50},
  {id:'c5',   name:'Combo Starter', desc:'5× combo streak',            ico:'🌟', chk:g=>g.maxCombo>=5},
  {id:'c10',  name:'Hyper Pilot',   desc:'10× combo — HYPER MODE!',    ico:'💥', chk:g=>g.maxCombo>=10},
  {id:'nm3',  name:'Daredevil',     desc:'3 near misses in one run',   ico:'😰', chk:g=>g.nearMisses>=3},
  {id:'sk6',  name:'Collector',     desc:'Unlock all skins',           ico:'🎨', chk:g=>D.skins.length>=6},
  {id:'hyp',  name:'Hyper Mode',    desc:'Trigger hyper mode',         ico:'🚀', chk:g=>g.hyperFired},
];

// ═══════════════════════════════════════════════════════════════
// MAIN GAME
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W=0, H=0, DPR=1;

function resize(){
  const vvp = window.visualViewport;
  W = vvp ? vvp.width  : document.documentElement.clientWidth;
  H = vvp ? vvp.height : document.documentElement.clientHeight;
  DPR = Math.min(window.devicePixelRatio||1, 2);
  canvas.width  = W*DPR; canvas.height = H*DPR;
  canvas.style.width  = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
if(window.visualViewport) window.visualViewport.addEventListener('resize', resize);
resize();

// ── STATE MACHINE ──
// intro → ready → playing → dying → gameover
// any   → paused → playing
// any   → settings / achievements
let STATE = 'intro';
let prevState = 'intro'; // for back-navigation from settings/achievements

// ── GAME VARS ──
let score=0, combo=0, maxCombo=0, multiplier=1;
let nearMisses=0, hyperFired=false;
let hyperMode=false, hyperTimer=0;
let pipes=[], pipeTimer=0;
let pipeTheme=0;
let pipeSpeed=0, pipeGap=0, pipeSpawnInt=0;
let hitStop=0, deathTimer=0;
let lastTs=0;

// bird
let bx=0, by=0, bvy=0, bAlive=false, bAngle=0, bWing=0, bGlow=0, bBounce=0;

// screen shake
let shakeX=0, shakeY=0, shakeAmt=0;

// stars (background) — generated once
const STARS = Array.from({length:80},()=>({
  x:Math.random(), y:Math.random()*.65,
  s:Math.random()*1.8+.4, tw:Math.random()*Math.PI*2,
  sp:.15+Math.random()*.25
}));

// particles
const parts = new Particles();

// ready state animation
let readyAlpha=0, readyArrow=0;

// ── PHYSICS CONSTANTS ──
const GRAV = 1750;
const FLAP_V = -470;
const MAX_FALL = 680;
const BIRD_R = 16; // collision radius (tight)

// ── PIPE PARAMS ──
const PIPE_W = 68;
const GAP_BASE = 200, GAP_MIN = 145;
const SPD_BASE = 210, SPD_MAX = 380;
const INT_BASE = 1.85, INT_MIN = 1.1;

function resetDifficulty(){
  pipeSpeed=SPD_BASE; pipeGap=GAP_BASE; pipeSpawnInt=INT_BASE; pipeTimer=INT_BASE*.5;
}
function scaleDifficulty(){
  const t = Math.min(score/55, 1);
  pipeSpeed = SPD_BASE + (SPD_MAX-SPD_BASE)*t;
  pipeGap   = GAP_BASE - (GAP_BASE-GAP_MIN)*t;
  pipeSpawnInt = INT_BASE - (INT_BASE-INT_MIN)*t;
}

// ═══════════════════════════════════════════════════════════════
// INPUT — unified, position-aware
// ═══════════════════════════════════════════════════════════════
// Pause zone: top 58px anywhere on screen (only during 'playing')
// Everything else = flap
const PAUSE_ZONE_H = 58;

function onTap(x, y){
  Audio.resume();
  if(STATE==='intro'){
    // ignore taps on button area (bottom portion where buttons live)
    // buttons handle themselves; tapping title area starts game
    showReady();
    return;
  }
  if(STATE==='ready'){
    startPlaying();
    return;
  }
  if(STATE==='playing'){
    // Pause zone: top strip
    if(y <= PAUSE_ZONE_H){
      doPause();
    } else {
      doFlap();
    }
    return;
  }
  if(STATE==='paused'){
    // tap anywhere outside buttons resumes — buttons handle themselves
    return;
  }
}

let _lastTouch = 0;
// Single unified touch handler on canvas
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const now = Date.now();
  if(now - _lastTouch < 100) return; // debounce multi-touch
  _lastTouch = now;
  const t = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  onTap(t.clientX - rect.left, t.clientY - rect.top);
}, {passive:false});

// Desktop click fallback (only if no touch used yet)
let _hadTouch = false;
window.addEventListener('touchstart', ()=>{ _hadTouch=true; }, {once:true, passive:true});
canvas.addEventListener('click', e=>{
  if(_hadTouch) return;
  const rect = canvas.getBoundingClientRect();
  onTap(e.clientX-rect.left, e.clientY-rect.top);
});

document.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); onTap(W/2, H/2); }
  if(e.code==='KeyP'||e.code==='Escape'){
    if(STATE==='playing') doPause();
    else if(STATE==='paused') doResume();
  }
});

// ═══════════════════════════════════════════════════════════════
// UI BUTTON WIRING — safe, no interference with canvas
// ═══════════════════════════════════════════════════════════════
function wireBtn(id, fn){
  const el = document.getElementById(id);
  if(!el) return;
  let _t=false;
  el.addEventListener('touchstart', e=>{
    e.stopPropagation(); // prevent bubble to canvas
    e.preventDefault();
    _t=true; fn();
  }, {passive:false});
  el.addEventListener('click', e=>{
    e.stopPropagation();
    if(_t){ _t=false; return; }
    fn();
  });
}

// Toggle wiring
document.querySelectorAll('.tog').forEach(el=>{
  const key = el.dataset.key;
  let _t=false;
  function toggle(){
    S[key] = !S[key];
    el.classList.toggle('on', S[key]);
    S.save();
    // Immediate effect
    if(key==='music'){ S.music ? Audio.startMusic() : Audio.stopMusic(); }
    if(key==='vibration'||key==='particles'||key==='reducedMotion'||key==='highContrast'){ /* read live */ }
  }
  el.addEventListener('touchstart', e=>{
    e.stopPropagation(); e.preventDefault(); _t=true; toggle();
  }, {passive:false});
  el.addEventListener('click', e=>{
    e.stopPropagation(); if(_t){ _t=false; return; } toggle();
  });
});

// Skin buttons — built dynamically, wired in buildSkinRow()
function buildSkinRow(){
  const row = document.getElementById('skinRow');
  row.innerHTML='';
  SKINS.forEach((sk,i)=>{
    const el = document.createElement('div');
    el.className = 'sk' + (D.skinIdx===i?' active':'') + (D.skins.includes(i)?'':' locked');
    el.textContent = sk.e;
    el.title = D.skins.includes(i) ? sk.name : 'Locked';
    if(D.skins.includes(i)){
      let _t=false;
      el.addEventListener('touchstart',e=>{
        e.stopPropagation(); e.preventDefault(); _t=true;
        D.skinIdx=i; D.save();
        document.querySelectorAll('.sk').forEach((b,j)=>b.classList.toggle('active',j===i));
      },{passive:false});
      el.addEventListener('click',e=>{ e.stopPropagation(); if(_t){_t=false;return;}
        D.skinIdx=i; D.save();
        document.querySelectorAll('.sk').forEach((b,j)=>b.classList.toggle('active',j===i));
      });
    }
    row.appendChild(el);
  });
}

// SCREEN MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function showScr(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  if(id) document.getElementById(id).classList.add('on');
}
function hideAll(){ document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on')); }

function goIntro(){
  STATE='intro'; pipes=[]; parts.clear(); hitStop=0;
  bAlive=false;
  document.getElementById('introBest').textContent=D.best;
  showScr('scrIntro');
  Audio.stopMusic();
  if(S.music) Audio.startMusic();
}

function showReady(){
  STATE='ready';
  // Reset bird to idle position
  bx=W*.27; by=H*.43; bvy=0; bAngle=0; bWing=0; bAlive=false;
  pipes=[]; parts.clear(); hitStop=0;
  readyAlpha=0;
  hideAll(); // No HTML overlay — drawn on canvas
}

function startPlaying(){
  STATE='playing';
  bAlive=true; bvy=FLAP_V*.4; // gentle start flap
  score=0; combo=0; maxCombo=0; multiplier=1;
  nearMisses=0; hyperFired=false; hyperMode=false; hyperTimer=0;
  pipes=[]; pipeTimer=INT_BASE*.5; pipeTheme=0;
  resetDifficulty();
  parts.clear(); hitStop=0; deathTimer=0;
  hideAll();
}

function startGame(){
  // Called from "play again" — go straight to ready state
  STATE='intro'; // brief reset
  showReady();
}

function doPause(){
  if(STATE!=='playing') return;
  STATE='paused'; showScr('scrPause');
}

function doResume(){
  if(STATE!=='paused') return;
  STATE='playing'; lastTs=0; hideAll();
}

function openSettings(from){
  prevState=from; STATE='settings';
  // Sync toggle visuals to current settings
  document.querySelectorAll('.tog').forEach(el=>{
    el.classList.toggle('on', S[el.dataset.key]);
  });
  showScr('scrSet');
}
function closeSettings(){
  if(prevState==='paused'){ STATE='paused'; showScr('scrPause'); }
  else if(prevState==='gameover'){ STATE='gameover'; showScr('scrGO'); }
  else { goIntro(); }
}

function openAch(from){
  prevState=from; STATE='achievements';
  buildAchGrid(); showScr('scrAch');
}
function closeAch(){
  if(prevState==='gameover'){ STATE='gameover'; showScr('scrGO'); }
  else { goIntro(); }
}

function buildAchGrid(){
  const grid=document.getElementById('achGrid');
  grid.innerHTML='';
  ACHS.forEach(a=>{
    const done=!!D.achs[a.id];
    const el=document.createElement('div');
    el.className='ach-card'+(done?' done':'');
    el.innerHTML=`<div class="ach-ico" style="opacity:${done?1:.3}">${a.ico}</div>
      <div class="ach-nm" style="opacity:${done?1:.45}">${done?a.name:'???'}</div>
      <div class="ach-ds">${done?a.desc:'Keep playing'}</div>`;
    grid.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════════════
// GAME ACTIONS
// ═══════════════════════════════════════════════════════════════
function doFlap(){
  if(!bAlive || hitStop>0){ return; }
  bvy=FLAP_V; bWing=Math.PI;
  Audio.flap();
  parts.spawn(bx-12, by, {count:5, speed:70, color:SKINS[D.skinIdx].t, size:2.5, decay:3.5, angle:Math.PI+.2, gravity:false});
  if(S.vibration && navigator.vibrate) navigator.vibrate(12);
}

function spawnPipe(){
  const m=H*.12;
  const cy = m + Math.random()*(H-m*2-pipeGap) + pipeGap/2;
  pipes.push({
    x:W+PIPE_W, gap:pipeGap, cy, speed:hyperMode?pipeSpeed*1.45:pipeSpeed,
    passed:false, nearDone:false, eph:Math.random()*Math.PI*2, theme:pipeTheme
  });
  pipeTheme=(pipeTheme+1)%6;
}

function addScore(){
  score++;
  combo++; if(combo>maxCombo) maxCombo=combo;
  multiplier = 1+Math.floor(combo/3)*.5;
  if(combo>=10 && !hyperMode){ triggerHyper(); }
  Audio.score();
  if(combo>1 && combo%3===0) Audio.combo(combo/3);
  scaleDifficulty();
  // Skin unlocks
  const unlocks=[[3,1],[8,2],[18,3],[30,4],[48,5]];
  unlocks.forEach(([sc,idx])=>{
    if(score>=sc && D.unlockSkin(idx)) showAchPop(SKINS[idx].e+' '+SKINS[idx].name+' Unlocked!');
  });
  // Check achs
  checkAchs();
  parts.spawn(bx+10,by,{count:6,color:SKINS[D.skinIdx].t,size:3,speed:100,decay:2,gravity:false});
}

function triggerHyper(){
  hyperMode=true; hyperTimer=7; hyperFired=true;
  Audio.hyper();
  shakeAmt=10;
}

function doDie(){
  if(!bAlive) return;
  bAlive=false; hitStop=8;
  Audio.die();
  shakeAmt=18;
  parts.spawn(bx,by,{count:22,color:SKINS[D.skinIdx].c,size:5,speed:220,decay:1.4,gravity:true});
  if(S.vibration && navigator.vibrate) navigator.vibrate([40,20,70]);
  D.runs++; if(score>D.best){ D.best=score; } D.save();
  checkAchs();
  setTimeout(showGameOver, 1300);
}

function showGameOver(){
  if(STATE==='gameover') return;
  STATE='gameover';
  document.getElementById('goScore').textContent=score;
  document.getElementById('goBest').textContent=D.best;
  const badge=document.getElementById('goBadge');
  badge.innerHTML=(score>0&&score===D.best)?'<span class="new-badge">NEW!</span>':'';
  buildSkinRow(); showScr('scrGO');
}

function checkAchs(){
  const g={score,maxCombo,nearMisses,hyperFired};
  ACHS.forEach(a=>{
    if(!D.achs[a.id] && a.chk(g)){
      D.achs[a.id]=true; D.save();
      setTimeout(()=>showAchPop(a.ico+' '+a.name),400);
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// COLLISION
// ═══════════════════════════════════════════════════════════════
function checkCollision(){
  if(!bAlive) return;
  // Floor / ceiling
  if(by-BIRD_R < 0 || by+BIRD_R > H){ doDie(); return; }
  for(const p of pipes){
    const topY = p.cy - p.gap/2;
    const botY = p.cy + p.gap/2;
    const pLeft=p.x-2, pRight=p.x+PIPE_W+2;
    if(bx+BIRD_R*0.7 > pLeft && bx-BIRD_R*0.7 < pRight){
      if(by-BIRD_R < topY || by+BIRD_R > botY){ doDie(); return; }
      // Near miss
      if(!p.nearDone){
        const dt=Math.min(topY-(by+BIRD_R), (by-BIRD_R)-botY);
        if(dt<24 && dt>0){
          p.nearDone=true; nearMisses++;
          Audio.nearMiss();
          _showNearMiss=8;
          parts.spawn(bx,by,{count:10,color:'#06d6a0',size:3,speed:130,decay:2.5});
          if(S.vibration&&navigator.vibrate) navigator.vibrate(20);
        }
      }
    }
  }
}

let _showNearMiss=0, _nearMissAlpha=0;
let _comboText='', _comboAlpha=0;

// ═══════════════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════════════
function update(dt){
  // Screen shake decay
  shakeAmt = Math.max(0, shakeAmt-12*dt);
  shakeX=(Math.random()-.5)*shakeAmt; shakeY=(Math.random()-.5)*shakeAmt;

  if(STATE==='ready'){
    bBounce=Math.sin(Date.now()*.003)*9;
    bWing+=4*dt; bAngle=Math.sin(Date.now()*.003)*.12; bGlow=(Math.sin(Date.now()*.004)+1)*.5;
    readyAlpha=Math.min(1,readyAlpha+dt*3);
    parts.trail(bx, by+bBounce, SKINS[D.skinIdx].t);
    parts.update(dt);
    return;
  }
  if(STATE==='intro'){
    // idle bird animation in background
    bx=W*.27; bBounce=Math.sin(Date.now()*.003)*8;
    by=H*.43; bWing+=3*dt; bAngle=Math.sin(Date.now()*.003)*.1; bGlow=(Math.sin(Date.now()*.005)+1)*.5;
    parts.trail(bx,by+bBounce,SKINS[D.skinIdx].t);
    parts.update(dt);
    return;
  }
  if(STATE!=='playing') return;

  // Hyper mode timer
  if(hyperMode){ hyperTimer-=dt; if(hyperTimer<=0) hyperMode=false; }

  // Bird physics
  bvy = Math.min(bvy+GRAV*dt, MAX_FALL);
  by += bvy*dt;
  bAngle = Math.max(-.5, Math.min(1.3, bvy/380));
  bWing += (Math.abs(bvy/180)+2)*dt;
  bGlow = (Math.sin(Date.now()*.008)+1)*.5;

  // Trail
  parts.trail(bx, by, SKINS[D.skinIdx].t);
  parts.update(dt);

  // Pipes
  pipeTimer-=dt;
  if(pipeTimer<=0){ spawnPipe(); pipeTimer=pipeSpawnInt; }
  for(let i=pipes.length-1;i>=0;i--){
    const p=pipes[i];
    p.x -= (hyperMode?p.speed*1.4:p.speed)*dt;
    p.eph+=dt*2.5;
    if(!p.passed && p.x+PIPE_W < bx){ p.passed=true; addScore(); }
    if(p.x+PIPE_W < -20) pipes.splice(i,1);
  }

  checkCollision();

  // Near miss display
  if(_showNearMiss>0){ _showNearMiss-=dt*4; _nearMissAlpha=Math.min(1,_showNearMiss); }
  else _nearMissAlpha=0;
  if(_comboAlpha>0) _comboAlpha-=dt*1.8;

  // Stars parallax
  STARS.forEach(s=>{ s.x-=s.sp*dt*.008; if(s.x<0) s.x=1; s.tw+=dt*1.5; });
}

// ═══════════════════════════════════════════════════════════════
// DRAW BIRD
// ═══════════════════════════════════════════════════════════════
function drawBird(x, y, angle, skinIdx, wingPhase, glow, alpha=1){
  const sk=SKINS[skinIdx];
  const wingOsc=Math.sin(wingPhase)*.65;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(x,y); ctx.rotate(angle);
  ctx.shadowBlur=18+glow*14; ctx.shadowColor=sk.c;
  // body
  ctx.fillStyle=sk.c;
  ctx.beginPath(); ctx.ellipse(0,0,17,12,0,0,Math.PI*2); ctx.fill();
  // wing
  ctx.shadowBlur=0; ctx.fillStyle=sk.w;
  ctx.beginPath(); ctx.ellipse(-4,2+wingOsc*7,12,9,.35+wingOsc*.4,0,Math.PI*2); ctx.fill();
  // eye
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(8,-5,4.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(9,-6,1.8,0,Math.PI*2); ctx.fill();
  // beak
  ctx.fillStyle='#ffbe0b';
  ctx.beginPath(); ctx.moveTo(17,-1); ctx.lineTo(26,1); ctx.lineTo(17,4); ctx.closePath(); ctx.fill();
  // highlight
  ctx.fillStyle='rgba(255,255,255,.25)';
  ctx.beginPath(); ctx.ellipse(-4,-5,7,5,-.3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// DRAW PIPE
// ═══════════════════════════════════════════════════════════════
function drawPipe(p){
  const topH = p.cy - p.gap/2;
  const botY = p.cy + p.gap/2;
  const hue = 180+p.theme*30;
  const neon=`hsl(${hue},100%,52%)`;
  const dark=`hsl(${hue},55%,14%)`;
  const e=(Math.sin(p.eph)+1)/2;
  const pw=PIPE_W;

  [[0,topH,false],[botY,H-botY,true]].forEach(([py,ph,bot])=>{
    if(ph<=0) return;
    ctx.save();
    ctx.shadowBlur=16; ctx.shadowColor=neon;
    const g=ctx.createLinearGradient(p.x,0,p.x+pw,0);
    g.addColorStop(0,dark); g.addColorStop(.35,neon); g.addColorStop(.65,neon); g.addColorStop(1,dark);
    ctx.fillStyle=g;
    const r=5;
    ctx.beginPath();
    if(!bot){
      ctx.moveTo(p.x+r,py); ctx.lineTo(p.x+pw-r,py);
      ctx.quadraticCurveTo(p.x+pw,py,p.x+pw,py+r);
      ctx.lineTo(p.x+pw,py+ph); ctx.lineTo(p.x,py+ph);
      ctx.quadraticCurveTo(p.x,py,p.x+r,py);
    } else {
      ctx.moveTo(p.x,py); ctx.lineTo(p.x+pw,py);
      ctx.lineTo(p.x+pw,py+ph-r); ctx.quadraticCurveTo(p.x+pw,py+ph,p.x+pw-r,py+ph);
      ctx.lineTo(p.x+r,py+ph); ctx.quadraticCurveTo(p.x,py+ph,p.x,py+ph-r); ctx.lineTo(p.x,py);
    }
    ctx.closePath(); ctx.fill();
    // border
    ctx.strokeStyle=`rgba(255,255,255,${.25+e*.6})`; ctx.lineWidth=1.5; ctx.stroke();
    // cap
    const cx=p.x-5, cw=pw+10, ch=16;
    ctx.fillStyle=neon; ctx.shadowBlur=22;
    if(!bot){ ctx.fillRect(cx,topH-ch,cw,ch); ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=1; ctx.strokeRect(cx,topH-ch,cw,ch); }
    else     { ctx.fillRect(cx,botY,cw,ch);   ctx.strokeRect(cx,botY,cw,ch); }
    // energy scan (simple, not too busy)
    if(!S.reducedMotion){
      const scanY=py+(ph*((p.eph%(Math.PI*2))/(Math.PI*2)));
      const sg=ctx.createLinearGradient(p.x,scanY-6,p.x,scanY+6);
      sg.addColorStop(0,'transparent'); sg.addColorStop(.5,`rgba(255,255,255,${.25+e*.3})`); sg.addColorStop(1,'transparent');
      ctx.fillStyle=sg; ctx.shadowBlur=0;
      ctx.fillRect(p.x,Math.max(py,scanY-6),pw,Math.min(12,ph));
    }
    ctx.restore();
  });
}

// ═══════════════════════════════════════════════════════════════
// DRAW BACKGROUND — clean, subtle, not distracting during play
// ═══════════════════════════════════════════════════════════════
let bgPhase=0;
function drawBackground(){
  bgPhase+=0.003;
  // Sky gradient — always deep space, simple 2-stop
  const sg=ctx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#010810'); sg.addColorStop(1,'#030e25');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

  // Stars — only 2 layers, subtle
  if(!S.highContrast){
    STARS.forEach(s=>{
      const tw=(Math.sin(s.tw)+1)/2;
      ctx.save(); ctx.globalAlpha=.25+tw*.45;
      ctx.fillStyle=`hsl(${210+tw*30},70%,${75+tw*20}%)`;
      if(!S.reducedMotion){ ctx.shadowBlur=3+tw*5; ctx.shadowColor='rgba(150,200,255,.8)'; }
      ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.s,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  // Subtle horizon glow
  const hg=ctx.createLinearGradient(0,H*.6,0,H);
  hg.addColorStop(0,'transparent'); hg.addColorStop(1,'rgba(0,60,140,.12)');
  ctx.fillStyle=hg; ctx.fillRect(0,H*.6,W,H*.4);

  // Ground line — single clean line
  ctx.save();
  ctx.strokeStyle=S.highContrast?'rgba(255,255,255,.5)':'rgba(0,180,255,.2)';
  ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,H*.82); ctx.lineTo(W,H*.82); ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// DRAW HUD (on canvas — no HTML interference)
// ═══════════════════════════════════════════════════════════════
function drawHUD(){
  if(STATE!=='playing') return;
  const sk=SKINS[D.skinIdx];

  // ── Pause zone indicator (top strip) ──
  // Subtle gradient strip at top
  ctx.save();
  const pzg=ctx.createLinearGradient(0,0,0,PAUSE_ZONE_H);
  pzg.addColorStop(0,'rgba(0,0,0,.35)'); pzg.addColorStop(1,'transparent');
  ctx.fillStyle=pzg; ctx.fillRect(0,0,W,PAUSE_ZONE_H);
  ctx.restore();

  // Pause icon (top right corner, clearly in pause zone)
  ctx.save();
  ctx.globalAlpha=.7;
  ctx.fillStyle='rgba(0,0,0,.45)';
  roundRect(ctx, W-52, 10, 42, 36, 8); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.8)';
  ctx.fillRect(W-44, 18, 5, 20); ctx.fillRect(W-35, 18, 5, 20);
  ctx.restore();

  // Score — centered, big
  ctx.save();
  ctx.font=`900 ${Math.round(clamp(W*.1,32,64))}px 'Courier New',monospace`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.shadowBlur=20; ctx.shadowColor='#00f5ff';
  ctx.fillStyle='#fff'; ctx.fillText(score, W/2, 8);
  ctx.restore();

  // Combo indicator (bottom left, small)
  if(combo>1){
    ctx.save();
    ctx.font=`700 ${Math.round(clamp(W*.035,12,18))}px 'Courier New',monospace`;
    ctx.textAlign='left'; ctx.textBaseline='bottom';
    ctx.shadowBlur=10; ctx.shadowColor='#ffbe0b';
    ctx.fillStyle='#ffbe0b';
    ctx.fillText(`×${combo} COMBO`, 16, H-16);
    ctx.restore();
  }

  // Near miss text
  if(_nearMissAlpha>0){
    ctx.save();
    ctx.globalAlpha=Math.min(1,_nearMissAlpha);
    ctx.font=`700 ${Math.round(clamp(W*.05,16,24))}px 'Courier New',monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=18; ctx.shadowColor='#06d6a0';
    ctx.fillStyle='#06d6a0';
    ctx.fillText('NEAR MISS!', W/2, H*.32);
    ctx.restore();
  }

  // Hyper mode indicator
  if(hyperMode){
    ctx.save();
    const hp=hyperTimer/7;
    ctx.globalAlpha=.6+Math.sin(Date.now()*.01)*.3;
    ctx.font=`900 ${Math.round(clamp(W*.06,20,32))}px 'Courier New',monospace`;
    ctx.textAlign='right'; ctx.textBaseline='top';
    ctx.shadowBlur=25; ctx.shadowColor='#ffbe0b';
    ctx.fillStyle='#ffbe0b';
    ctx.fillText('HYPER', W-16, 14);
    // timer bar
    ctx.globalAlpha=.5;
    ctx.fillStyle='rgba(255,190,11,.2)';
    ctx.fillRect(W-120,46,100,4);
    ctx.fillStyle='#ffbe0b'; ctx.shadowBlur=8;
    ctx.fillRect(W-120,46,100*hp,4);
    ctx.restore();
  }

  // Pause zone label (very subtle)
  ctx.save();
  ctx.globalAlpha=.28;
  ctx.font=`700 9px 'Courier New',monospace`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillStyle='#fff';
  ctx.fillText('▲ TAP TO PAUSE', W/2, 48);
  ctx.restore();
}

function drawReady(){
  if(STATE!=='ready') return;
  ctx.save();
  ctx.globalAlpha=Math.min(1,readyAlpha);
  // Dark vignette
  const vg=ctx.createRadialGradient(W/2,H/2,H*.15,W/2,H/2,H*.75);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,.5)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  // "GET READY" text
  ctx.font=`900 ${Math.round(clamp(W*.06,20,32))}px 'Courier New',monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowBlur=20; ctx.shadowColor='#00f5ff';
  ctx.fillStyle='rgba(255,255,255,.9)';
  ctx.fillText('GET READY', W/2, H*.3);
  // Big tap prompt
  ctx.font=`700 ${Math.round(clamp(W*.05,16,22))}px 'Courier New',monospace`;
  const tapAlpha=.5+Math.sin(Date.now()*.004)*.45;
  ctx.globalAlpha=Math.min(1,readyAlpha)*tapAlpha;
  ctx.shadowBlur=12; ctx.shadowColor='rgba(255,255,255,.5)';
  ctx.fillStyle='#fff';
  ctx.fillText('TAP TO FLY', W/2, H*.55);
  // Arrow bounce
  ctx.globalAlpha=Math.min(1,readyAlpha)*(.4+Math.abs(Math.sin(Date.now()*.004))*.5);
  ctx.font=`900 ${Math.round(clamp(W*.04,14,20))}px 'Courier New',monospace`;
  const arrY=H*.55+32+Math.sin(Date.now()*.004)*6;
  ctx.fillText('▼', W/2, arrY);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(!S.reducedMotion && (STATE==='playing'||STATE==='dying')){
    ctx.translate(shakeX,shakeY);
  }

  drawBackground();

  // Idle bird (intro / ready states)
  if(STATE==='intro'||STATE==='ready'){
    parts.draw(ctx);
    drawBird(bx, by+(bBounce||0), bAngle, D.skinIdx, bWing, bGlow);
  }

  // Gameplay elements
  if(STATE==='playing'||STATE==='paused'){
    pipes.forEach(p=>drawPipe(p));
    parts.draw(ctx);
    drawBird(bx, by, bAngle, D.skinIdx, bWing, bGlow);
  }

  // Dying — bird fades
  if(STATE==='gameover' && bAlive===false && deathTimer!==undefined){
    pipes.forEach(p=>drawPipe(p));
    parts.draw(ctx);
    // Bird fades out handled by doDie timeout
  }

  ctx.restore();

  // HUD and overlays (no shake on UI)
  drawHUD();
  drawReady();

  // Hyper overlay tint
  if(hyperMode && !S.reducedMotion){
    ctx.save();
    const ht=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.7);
    ht.addColorStop(0,'transparent'); ht.addColorStop(1,'rgba(255,190,11,.06)');
    ctx.fillStyle=ht; ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════════
function loop(ts){
  requestAnimationFrame(loop);
  const dt = lastTs ? Math.min((ts-lastTs)/1000, .05) : .016;
  lastTs=ts;
  if(hitStop>0){ hitStop--; render(); return; }
  update(dt);
  render();
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
S.load(); D.load();
document.getElementById('introBest').textContent=D.best;
// Sync toggle visuals on init
document.querySelectorAll('.tog').forEach(el=>{
  el.classList.toggle('on', S[el.dataset.key]);
});
buildSkinRow(); buildAchGrid();
bx=W*.27; by=H*.43; bvy=0;
Audio.init();
if(S.music) Audio.startMusic();
requestAnimationFrame(loop);
</script>
